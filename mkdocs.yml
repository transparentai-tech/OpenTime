site_name: OpenTime
site_url: https://SyntheticCognitionLabs.github.io/OpenTime
site_description: Temporal awareness and time-effort estimation for AI agents
repo_url: https://github.com/SyntheticCognitionLabs/OpenTime
repo_name: SyntheticCognitionLabs/OpenTime

theme:
  name: material
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Integrations:
    - MCP Server: integrations/mcp.md
    - REST API: integrations/rest-api.md
    - Docker: integrations/docker.md
    - LangChain: integrations/langchain.md
    - OpenAI & Gemini: integrations/openai-gemini.md
    - Passive Hooks:
      - Overview: integrations/hooks/index.md
      - Claude Code: integrations/hooks/claude-code.md
      - Cursor: integrations/hooks/cursor.md
      - Cline: integrations/hooks/cline.md
      - GitHub Copilot: integrations/hooks/copilot.md
      - Windsurf: integrations/hooks/windsurf.md
      - Amazon Q: integrations/hooks/amazon-q.md
  - Guides:
    - Team Setup: guides/team-setup.md
    - Agent Prompt Templates: guides/prompt-templates.md
  - Reference:
    - MCP Tools: reference/mcp-tools.md
    - REST API Endpoints: reference/api-endpoints.md
    - Configuration: reference/configuration.md
  - Dashboard: dashboard.md
  - Roadmap: roadmap.md
